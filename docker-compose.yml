version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eco_finance_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecomdb

  redis:
    image: redis:alpine
    container_name: eco_finance_redis
    ports:
      - "6379:6379"

  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: eco_finance_web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root:password@db:5432/ecomdb?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis